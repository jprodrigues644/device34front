name: CI - Angular

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  test:
    name: "Tests Angular"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm test -- --watch=false --browsers=ChromeHeadless
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapports-angular
          path: test-results/