server {
    listen 80;
    server_name localhost;

    # Root pointant vers /app comme indiqué dans le README
    root /app;
    index index.html;

    # SPA routing : redirige tout vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long terme pour les assets Angular hachés
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}